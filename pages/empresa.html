<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário Interativo - ECHO</title>

<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<header>
  <div class="logo"><img src="../assets/Logo.png" alt="ECHO"></div>
  <h1>Construtor de Formulários</h1>
</header>

<div class="container">
  <div class="form-builder">

    <div class="catalog">
      <h2>Perguntas Prontas</h2>

      <div class="question-item">
        <label><input type="checkbox" value="Você está satisfeito com o serviço?" data-type="text">Você está satisfeito com o serviço?</label>
      </div>

      <div class="question-item">
        <label><input type="checkbox" value="O atendimento foi rápido?" data-type="yesno">O atendimento foi rápido?</label>
      </div>

      <div class="question-item">
        <label><input type="checkbox" value="Você recomendaria a empresa para amigos?" data-type="text">Você recomendaria a empresa para amigos?</label>
      </div>

      <div class="question-item">
        <label><input type="checkbox" value="A comunicação da empresa é clara?" data-type="multiple">A comunicação da empresa é clara?</label>
      </div>

      <div class="question-item">
        <label><input type="checkbox" value="O produto/serviço atendeu suas expectativas?" data-type="rating">O produto/serviço atendeu suas expectativas?</label>
      </div>

      <div class="add-custom">
        <input type="text" id="custom-question" placeholder="Pergunta personalizada...">
        <select id="custom-type">
          <option value="text">Texto</option>
          <option value="yesno">Sim/Não</option>
          <option value="multiple">Múltipla escolha</option>
          <option value="rating">Avaliação (estrelas)</option>
        </select>
        <button id="add-custom-btn">Adicionar</button>
      </div>
    </div>

    <div class="selected-form">
      <h2>Formulário</h2>
      <div id="selected-questions"></div>

      <div class="action-buttons">
        <button class="save-btn" id="save-btn">Salvar Formulário</button>
        <button class="preview-btn" id="preview-btn">Visualizar</button>
      </div>
    </div>

  </div>
</div>

<footer>

  <div class="active" onclick="window.location.href='feed.html'">
    <i class="fas fa-home"></i>
    <span>Início</span>
  </div>

  <div>
    <i class="fas fa-file-alt"></i>
    <span>Formulários</span>
  </div>

  <div>
    <i class="fas fa-comments"></i>
    <span>Feedback</span>
  </div>

  <div>
    <i class="fas fa-user"></i>
    <span>Perfil</span>
  </div>

</footer>

<div class="preview-modal" id="preview-modal">
  <div class="preview-content">
    <span class="preview-close" id="preview-close">&times;</span>
    <h2>Formulário para Cliente</h2>
    <div id="preview-questions"></div>
    <button class="submit-btn">Enviar Respostas</button>

    <div style="margin-top:15px; padding-top:10px; border-top:1px solid #eee; text-align:center; font-size:13px; color:#555;">
      © 2025 ECHO
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
</body>
</html>
